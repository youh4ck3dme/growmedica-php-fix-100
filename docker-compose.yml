services:
  app:
    build: .
    container_name: c1growmedical-app
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/php.ini:/usr/local/etc/php/php.ini:ro
      - ./docker/apache.conf:/etc/apache2/sites-available/000-default.conf:ro
    env_file:
      - .env.local
    depends_on:
      - db
    restart: always

  db:
    image: mariadb:10.5
    container_name: c1growmedical-db
    command: --character-set-server=utf8 --collation-server=utf8_slovak_ci
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: c1growmedical
      MYSQL_USER: c1growmedical
      MYSQL_PASSWORD: localpassword123
    volumes:
      - db_data:/var/lib/mysql
    restart: always

  adminer:
    image: adminer:latest
    container_name: c1growmedical-adminer
    ports:
      - "8081:8080"
    restart: always

volumes:
  db_data:
